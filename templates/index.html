<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAI | Tactical Digital Twin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-teal: #00b894;
            --neon-glow: rgba(0, 184, 148, 0.2);
            --bg-light: #f8f9fa;
            --panel-glass: rgba(255, 255, 255, 0.9);
            --border-subtle: rgba(0, 0, 0, 0.08);
            --text-dark: #2d3436;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light); color: var(--text-dark); 
            overflow: hidden; 
        }

        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 184, 148, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 184, 148, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 2;
        }

        #map { height: 100vh; width: 100vw; z-index: 1; background: var(--bg-light); }

        header {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); box-sizing: border-box;
        }

        .brand { font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; gap: 15px; }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: 2px; color: var(--text-dark); text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background: var(--neon-teal); border-radius: 50%; box-shadow: 0 0 10px var(--neon-teal); animation: pulse 2s infinite; }

        /* Signature Footer */
        footer {
            position: absolute; bottom: 20px; right: 20px; z-index: 100;
            font-size: 11px; color: #636e72; letter-spacing: 1px; font-weight: 600;
            background: var(--panel-glass); padding: 8px 15px; border-radius: 20px;
            border: 1px solid var(--border-subtle); backdrop-filter: blur(5px);
        }

        .overlay-center { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 10; pointer-events: auto; }
        .search-bar {
            background: var(--panel-glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle); padding: 6px 6px 6px 20px;
            border-radius: 12px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        input { background: transparent; border: none; color: var(--text-dark); width: 320px; font-size: 14px; outline: none; }
        select { background: #f1f3f5; color: var(--text-dark); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        .side-panel { position: absolute; bottom: 40px; left: 40px; z-index: 10; pointer-events: auto; }
        .data-card {
            background: var(--panel-glass); border: 1px solid var(--border-subtle);
            padding: 20px; border-radius: 16px; min-width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-left: 4px solid var(--neon-teal);
        }
        .data-card h4 { margin: 0 0 5px 0; font-size: 11px; text-transform: uppercase; color: #636e72; letter-spacing: 1px; }
        .data-card p { margin: 0; font-size: 16px; font-weight: 600; font-family: 'Space Grotesk'; color: var(--text-dark); }

        .action-menu { position: absolute; bottom: 80px; right: 20px; z-index: 10; display: flex; gap: 12px; pointer-events: auto; flex-direction: column; }
        .btn-action {
            background: #fff; border: 1px solid var(--border-subtle); color: var(--text-dark);
            padding: 12px 20px; border-radius: 10px; font-weight: 600; font-size: 13px;
            transition: all 0.3s; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center;
        }
        .btn-action:hover { border-color: var(--neon-teal); background: #f8f9fa; color: var(--neon-teal); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #confirm-container { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 11; opacity: 0; transition: 0.4s; }
        .btn-lock { 
            background: var(--neon-teal); color: white; 
            padding: 14px 28px; border-radius: 8px; border: none; 
            font-weight: 700; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 4px 15px var(--neon-glow);
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <header>
        <div class="brand">
            <div class="status-dot"></div>
            <div class="logo">Spatial.Engine // V2</div>
        </div>
    </header>

    <footer>MADE BY ANANYA VERMA</footer>

    <div id="map"></div>

    <div class="overlay-center">
        <div class="search-bar">
            <input type="text" id="project-name-input" placeholder="PROJECT NAME..." style="width: 180px; border-right: 1px solid var(--border-subtle); margin-right: 10px;">
            
            <input type="text" id="location-input" placeholder="SCAN COORDINATES OR REGION NAME..." onkeypress="handleSearch(event)">
            <select id="imagery-select">
                <option value="3">AUTO_LINK</option>
                <option value="1">MAPTILER_HQ</option>
                <option value="2">SENTINEL_S2</option>
            </select>
        </div>
    </div>

    <div class="side-panel">
        <div id="current-log" class="data-card" style="opacity: 0; transform: translateY(20px); transition: 0.5s;">
            <h4 id="log-title">Engine State</h4>
            <p id="log-detail">Awaiting target...</p>
        </div>
    </div>

    <div id="confirm-container">
        <button class="btn-lock" onclick="confirmMapSelection()">Lock Area for Synthesis</button>
    </div>

    <div class="action-menu" id="actions-container" style="opacity: 0;">
        <button class="btn-action" onclick="downloadDataset()">Export Package</button>
        <button class="btn-action">3D Vision</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentProjectName = "";
        const map = L.map('map', { zoomControl: false }).setView([22.9734, 78.6569], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        const logElement = document.getElementById('current-log');
        const titleElement = document.getElementById('log-title');
        const detailElement = document.getElementById('log-detail');
        const confirmContainer = document.getElementById('confirm-container');
        const backendUrl = window.location.origin;

        let startLatLng = null, selectionRect = null, finalBBox = null;

        document.getElementById('map').addEventListener('contextmenu', e => e.preventDefault());

        map.on('mousedown', function(e) {
            if (e.originalEvent.button === 2) { 
                map.dragging.disable(); 
                startLatLng = e.latlng;
                if (selectionRect) map.removeLayer(selectionRect);
                selectionRect = L.rectangle([startLatLng, startLatLng], {
                    color: "#00b894", weight: 2, fillColor: "#00b894", fillOpacity: 0.15, dashArray: '5, 5'
                }).addTo(map);
                confirmContainer.style.opacity = '0'; 
            }
        });

        map.on('mousemove', function(e) {
            if (startLatLng && selectionRect && e.originalEvent.buttons === 2) {
                selectionRect.setBounds([startLatLng, e.latlng]);
            }
        });

        map.on('mouseup', function(e) {
            if (e.originalEvent.button === 2 && startLatLng) {
                map.dragging.enable(); 
                finalBBox = selectionRect.getBounds();
                confirmContainer.style.opacity = '1';
                confirmContainer.style.pointerEvents = 'auto';
            }
        });

        function confirmMapSelection() {
            if (!finalBBox) return;
            confirmContainer.style.opacity = '0';
            const n = finalBBox.getNorth(), s = finalBBox.getSouth(), e = finalBBox.getEast(), w = finalBBox.getWest();
            
            // --- NEW: Grab the name from the input box ---
            let customName = document.getElementById('project-name-input').value.trim();
            if (customName === "") {
                customName = "Strategic_Site"; // Fallback if they leave it empty
            }
            
            startPipeline(`${n},${s},${e},${w}`, customName, document.getElementById('imagery-select').value);
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const location = event.target.value;
                if(!location) return;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
                    const data = await res.json();
                    if(data.length > 0) map.flyTo([data[0].lat, data[0].lon], 14);
                } catch(e) {}
                
                // --- NEW: Use custom name if provided, otherwise use the location name ---
                let customName = document.getElementById('project-name-input').value.trim();
                let displayName = customName !== "" ? customName : location;
                
                startPipeline(location, displayName, document.getElementById('imagery-select').value);
            }
        }

        function updateLog(stage, detail) {
            logElement.style.opacity = '1';
            logElement.style.transform = 'translateY(0)';
            titleElement.innerText = stage;
            detailElement.innerText = detail;
        }

        function startPipeline(targetData, displayName, imageryChoice) {
            currentProjectName = displayName.replace(/ /g, "_"); 
            const streamUrl = `${backendUrl}/stream_pipeline?target=${encodeURIComponent(targetData)}&name=${encodeURIComponent(displayName)}&imagery=${encodeURIComponent(imageryChoice)}`;
            const eventSource = new EventSource(streamUrl);

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                updateLog(data.stage, data.detail);
                if (data.status === 'complete') {
                    eventSource.close();
                    document.getElementById('actions-container').style.opacity = '1';
                }
            };
        }

        function downloadDataset() {
            window.location.href = `${backendUrl}/download/${currentProjectName}`;
        }
    </script>
</body>
</html>
